spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate

  elasticsearch:
    uris: ${ELASTICSEARCH_URI}

server:
  port: 8080

logging:
  level:
    root: WARN
    com.flowermarketplace: INFO
  file:
    name: /app/logs/app.log

management:
  endpoints:
    web:
      exposure:
        include: health,info
