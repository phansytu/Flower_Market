version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Flower Marketplace – Docker Compose
#
# Services:
#   app            – Spring Boot application
#   mysql          – Primary relational database
#   redis          – Cache / session store
#   rabbitmq       – Message broker
#   elasticsearch  – Full-text search
#   kibana         – ES visualiser   (profile: monitoring)
#   mailhog        – Local SMTP trap (profile: dev)
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ─── Application ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: flower-marketplace/backend:latest
    container_name: flower-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-flower_marketplace}
      DB_USERNAME: ${DB_USERNAME:-flower_user}
      DB_PASSWORD: ${DB_PASSWORD:-flower_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      ELASTICSEARCH_URI: http://elasticsearch:9200
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - flower-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  # ─── MySQL ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: flower-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-flower_marketplace}
      MYSQL_USER: ${DB_USERNAME:-flower_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-flower_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flower-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: flower-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flower-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m

  # ─── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: flower-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - flower-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m

  # ─── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: flower-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL",
             "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - flower-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g

  # ─── Kibana  (profile: monitoring) ─────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: flower-kibana
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_PASSWORD:-kibana_pass}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - flower-net
    profiles:
      - monitoring
    logging: *default-logging

  # ─── MailHog  (profile: dev – catches all outbound emails locally) ──────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: flower-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI  →  http://localhost:8025
    networks:
      - flower-net
    profiles:
      - dev
    logging: *default-logging

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  app_uploads:
  app_logs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  flower-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
