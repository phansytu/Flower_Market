spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate   # never auto-create in prod; use migrations

  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5

logging:
  level:
    com.flowermarketplace: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  file:
    name: /app/logs/flower-marketplace.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
