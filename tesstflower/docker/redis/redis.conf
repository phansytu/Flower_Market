# Redis configuration for Flower Marketplace

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory policy – evict LRU keys when memory limit is hit
maxmemory 200mb
maxmemory-policy allkeys-lru

# Snapshotting
save 900 1
save 300 10
save 60 10000

# Security (set a password via REDIS_PASSWORD env if needed)
# requirepass your_password_here

# Connection limits
maxclients 100

# Logging
loglevel notice
